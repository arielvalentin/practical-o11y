services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability Stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      tempo:
        condition: service_started

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"   # Grafana UI (3100 to avoid conflict with Store on 3000)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_started

  # --- Application Services ---

  store:
    build:
      context: ./store
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: demo-secret-key-base-not-for-real-production-use
      RAILS_SERVE_STATIC_FILES: "1"
      RAILS_LOG_TO_STDOUT: "1"
      SPREE_URL_PROTOCOL: http
      DATABASE_HOST: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      SHIPPING_SERVICE_URL: http://shipping:3001
      RECOMMENDATION_SERVICE_URL: http://recommendations:3002
      NOTIFICATION_SERVICE_URL: http://notifications:3003
      OTEL_SERVICE_NAME: store
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=practical-o11y"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./store:/app
      - store_bundle:/usr/local/bundle

  shipping:
    build:
      context: ./shipping-service
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: demo-secret-key-base-not-for-real-production-use
      RAILS_SERVE_STATIC_FILES: "1"
      RAILS_LOG_TO_STDOUT: "1"
      DATABASE_HOST: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      OTEL_SERVICE_NAME: shipping-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=practical-o11y"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./shipping-service:/app
      - shipping_bundle:/usr/local/bundle

  recommendations:
    build:
      context: ./recommendation-service
    ports:
      - "3002:3002"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: demo-secret-key-base-not-for-real-production-use
      RAILS_SERVE_STATIC_FILES: "1"
      RAILS_LOG_TO_STDOUT: "1"
      DATABASE_HOST: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      OTEL_SERVICE_NAME: recommendation-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=practical-o11y"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./recommendation-service:/app
      - recommendations_bundle:/usr/local/bundle

  notifications:
    build:
      context: ./notification-service
    ports:
      - "3003:3003"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: demo-secret-key-base-not-for-real-production-use
      RAILS_SERVE_STATIC_FILES: "1"
      RAILS_LOG_TO_STDOUT: "1"
      DATABASE_HOST: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=practical-o11y"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./notification-service:/app
      - notifications_bundle:/usr/local/bundle

volumes:
  postgres_data:
  store_bundle:
  shipping_bundle:
  recommendations_bundle:
  notifications_bundle:
  tempo_data:
  prometheus_data:
  grafana_data:
